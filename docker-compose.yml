services:
  postgres:
    image: postgres:17-alpine
    container_name: timetabling-postgres
    environment:
      POSTGRES_DB: timetabling
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d timetabling"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      TIMETABLING_APP_ENV: development
      TIMETABLING_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/timetabling
      TIMETABLING_AUTO_CREATE_SCHEMA: "false"
      TIMETABLING_EXPOSE_DOCS: "true"
      TIMETABLING_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
